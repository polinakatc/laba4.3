name: C++ CMake CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    name: 🚀 Сборка и Тестирование (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Клонирование репозитория
        uses: actions/checkout@v4

      - name: ⚙️ Конфигурация проекта (CMake)
        # Современный подход: задаем папку сборки через -B без ручного mkdir и cd
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: 🛠️ Компиляция исходного кода
        # build-system agnostic команда сборки
        run: cmake --build build --config Release --parallel $(nproc)

      - name: 🧪 Запуск модульных тестов (GTest)
        run: |
          cd build
          ./test

      - name: 🖥️ Запуск демонстрационной программы
        run: |
          cd build
          ./text